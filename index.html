<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Flow Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0e11;
    color: #eaecef;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    line-height: 1.4;
  }

  /* ── Header ── */
  .header {
    background: #0b0e11;
    border-bottom: 1px solid #1e2329;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .header h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }

  .live-badge {
    display: flex; align-items: center; gap: 5px;
    background: rgba(14,203,129,0.1); border: 1px solid rgba(14,203,129,0.3);
    padding: 2px 8px; border-radius: 3px;
    font-size: 10px; font-weight: 600; color: #0ecb81;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .live-badge .pulse {
    width: 5px; height: 5px; border-radius: 50%; background: #0ecb81;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header .status { font-size: 11px; color: #848e9c; }

  /* ── Toolbar ── */
  .toolbar {
    background: #0b0e11; border-bottom: 1px solid #1e2329;
    padding: 8px 20px; display: flex; justify-content: space-between;
    align-items: center; gap: 10px;
  }

  .toolbar-filters { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .filter-group { display: flex; align-items: center; gap: 3px; }
  .filter-group label { color: #848e9c; font-size: 11px; font-weight: 500; }

  .filter-group select, .filter-group input {
    background: #1e2329; border: 1px solid #2b3139; color: #eaecef;
    padding: 4px 8px; border-radius: 3px; font-family: inherit; font-size: 12px;
  }

  .filter-group select:focus, .filter-group input:focus { outline: none; border-color: #f0b90b; }

  .toolbar-stats {
    display: flex; gap: 16px; font-size: 11px; color: #848e9c; white-space: nowrap;
  }

  .toolbar-stats .val { color: #eaecef; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }

  .flow-table { min-width: 1280px; }

  .grid-cols {
    display: grid;
    grid-template-columns:
      58px    /* Time */
      64px    /* Ticker */
      44px    /* Side */
      50px    /* Bid/Ask */
      140px   /* Contract */
      36px    /* DTE */
      70px    /* Stock */
      62px    /* Spot */
      52px    /* % OTM */
      62px    /* Size */
      76px    /* Premium */
      72px    /* B/A Prem */
      64px    /* Bear/Bull */
      66px    /* Volume */
      62px    /* OI */
      56px    /* Vol/OI */
      60px    /* IV Chg */
    ;
    gap: 0;
  }

  .table-header {
    padding: 6px 16px;
    background: #1e2329;
    border-bottom: 1px solid #2b3139;
    position: sticky;
    top: 39px;
    z-index: 50;
  }

  .table-header .th {
    font-size: 10px; font-weight: 600; color: #848e9c;
    text-transform: uppercase; letter-spacing: 0.4px;
    padding: 0 4px; white-space: nowrap;
  }

  .table-header .th.r { text-align: right; }
  .table-header .th.c { text-align: center; }

  /* ── Rows ── */
  .flow-row {
    padding: 0 16px;
    border-bottom: 1px solid #181a1f;
    align-items: center;
    min-height: 36px;
    transition: background 0.12s;
    animation: fadeIn 0.2s ease-out;
  }

  .flow-row:nth-child(even) { background: rgba(30,35,41,0.25); }
  .flow-row:hover { background: #1e2329; }
  .flow-row.new-row { background: rgba(240,185,11,0.06); }

  /* Score indicator — colored left border */
  .flow-row.sc-high { border-left: 3px solid #f6465d; }
  .flow-row.sc-mid { border-left: 3px solid #f0b90b; }
  .flow-row.sc-low { border-left: 3px solid transparent; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .flow-row .c {
    padding: 6px 4px; font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Cell styles ── */
  .c-time { color: #848e9c; font-size: 11px; font-family: 'JetBrains Mono', monospace; }

  .c-ticker { font-weight: 700; font-size: 13px; color: #fff; }

  .c-ticker .type-tag {
    display: block; font-size: 9px; font-weight: 600;
    letter-spacing: 0.3px; text-transform: uppercase; margin-top: 1px;
  }

  .tag-sweep { color: #b266ff; }
  .tag-block { color: #448aff; }
  .tag-put-sup { color: #f6465d; }
  .tag-unusual { color: #f0b90b; }
  .tag-other { color: #848e9c; }

  /* Side pill (Call/Put) */
  .c-side { text-align: center; padding: 4px 0 !important; }

  .side-pill {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 11px; font-weight: 700; min-width: 28px; text-align: center;
  }

  .side-call { background: rgba(14,203,129,0.15); color: #0ecb81; }
  .side-put { background: rgba(246,70,93,0.15); color: #f6465d; }

  /* Bid/Ask pill */
  .c-bidask { text-align: center; padding: 4px 0 !important; }

  .ba-pill {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 700; min-width: 32px; text-align: center;
  }

  .ba-ask { background: #0ecb81; color: #000; }
  .ba-bid { background: #f6465d; color: #fff; }
  .ba-mid { background: #2b3139; color: #848e9c; }
  .ba-none { background: transparent; color: #474d57; }

  /* Contract */
  .c-contract { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #eaecef; }

  .c-contract .exp { color: #848e9c; font-size: 10px; margin-left: 4px; }

  /* Numeric */
  .c-num {
    text-align: right; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: #eaecef;
  }

  .c-num.dim { color: #5a6069; }
  .c-num.muted { color: #848e9c; }

  /* % OTM coloring */
  .otm-deep { color: #f6465d; }
  .otm-mid { color: #f0b90b; }
  .otm-near { color: #0ecb81; }
  .otm-itm { color: #848e9c; font-style: italic; }

  /* Vol/OI coloring */
  .voi-hot { color: #f6465d; font-weight: 600; }
  .voi-warm { color: #f0b90b; }
  .voi-normal { color: #848e9c; }

  /* ── Empty State ── */
  .empty-state { text-align: center; padding: 100px 20px; color: #474d57; }
  .empty-state h2 { font-size: 16px; margin-bottom: 6px; color: #848e9c; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #0b0e11; }
  ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #474d57; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>OPTIONS FLOW</h1>
    <div class="live-badge" id="liveBadge"><div class="pulse"></div><span>LIVE</span></div>
  </div>
  <div class="status" id="lastUpdate">Connecting...</div>
</div>

<div class="toolbar">
  <div class="toolbar-filters">
    <div class="filter-group">
      <label>Score</label>
      <select id="filterScore">
        <option value="0">All</option>
        <option value="4" selected>4+</option>
        <option value="6">6+</option>
        <option value="8">8+</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Type</label>
      <select id="filterType">
        <option value="all">All</option>
        <option value="SWEEP">Sweeps</option>
        <option value="LARGE_TRADE">Blocks</option>
        <option value="LARGE_PUT_ACTIVITY_AT_SUPPORT">Put @ Support</option>
        <option value="UNUSUAL">Unusual Vol</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Side</label>
      <select id="filterSide">
        <option value="all">All</option>
        <option value="call">Calls</option>
        <option value="put">Puts</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Ticker</label>
      <input id="filterTicker" type="text" placeholder="AAPL" size="5">
    </div>
    <div class="filter-group">
      <label>Date</label>
      <select id="filterDate"></select>
    </div>
  </div>
  <div class="toolbar-stats">
    <div>Alerts <span class="val" id="statCount">0</span></div>
    <div>Tickers <span class="val" id="statTickers">0</span></div>
    <div>Sweeps <span class="val" id="statSweeps">0</span></div>
    <div>Top <span class="val" id="statTopScore">—</span></div>
  </div>
</div>

<div class="table-wrap">
<div class="flow-table">
  <div class="table-header grid-cols">
    <div class="th">Time</div>
    <div class="th">Ticker</div>
    <div class="th c">Side</div>
    <div class="th c">Bid/Ask</div>
    <div class="th">Contract</div>
    <div class="th r">DTE</div>
    <div class="th r">Stock</div>
    <div class="th r">Spot</div>
    <div class="th r">% OTM</div>
    <div class="th r">Size</div>
    <div class="th r">Premium</div>
    <div class="th r">B/A Prem</div>
    <div class="th r">🐻/🐂</div>
    <div class="th r">Volume</div>
    <div class="th r">OI</div>
    <div class="th r">Vol/OI</div>
    <div class="th r">IV Chg</div>
  </div>

  <div id="tableBody">
    <div class="empty-state">
      <h2>Waiting for flow...</h2>
      <p>Alerts appear here in real-time when the scanner runs.</p>
    </div>
  </div>
</div>
</div>

<script>
const SUPABASE_URL = 'https://ylovbipfqhaktgqzifsx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsb3ZiaXBmcWhha3RncXppZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjQ0NjMsImV4cCI6MjA4Njg0MDQ2M30.-pL09_2YqgfqV-oHOn3eqVL7GIQKy9qOzbB5VV74gbE';

const HEADERS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };
const REST_URL = SUPABASE_URL + '/rest/v1/alerts';

let sb = null;
try { sb = window.supabase && window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

let allAlerts = [];
const tableBody = document.getElementById('tableBody');
const lastUpdate = document.getElementById('lastUpdate');

/* ── Helpers ── */
function fmtCurrency(n) {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + Number(n).toFixed(0);
}

function fmtNum(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}

function timeStr(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'America/New_York' });
}

function calcDTE(expiry) {
  if (!expiry) return '—';
  const exp = new Date(expiry + 'T16:00:00-05:00');
  const now = new Date();
  const diff = Math.ceil((exp - now) / 86400000);
  return diff >= 0 ? diff : 0;
}

function calcOTM(row) {
  if (!row.strike || !row.stock_price) return { pct: null, label: '—', cls: '' };
  const s = Number(row.strike), p = Number(row.stock_price);
  if (row.contract_type === 'call') {
    if (s <= p) return { pct: 0, label: 'ITM', cls: 'otm-itm' };
    const pct = ((s - p) / p * 100);
    return { pct, label: pct.toFixed(1) + '%', cls: pct > 15 ? 'otm-deep' : pct > 5 ? 'otm-mid' : 'otm-near' };
  } else {
    if (s >= p) return { pct: 0, label: 'ITM', cls: 'otm-itm' };
    const pct = ((p - s) / p * 100);
    return { pct, label: pct.toFixed(1) + '%', cls: pct > 15 ? 'otm-deep' : pct > 5 ? 'otm-mid' : 'otm-near' };
  }
}

function typeTag(row) {
  const t = row.signal_type;
  if (t === 'SWEEP') return '<span class="type-tag tag-sweep">SWEEP</span>';
  if (t === 'LARGE_TRADE') return '<span class="type-tag tag-block">BLOCK</span>';
  if (t === 'LARGE_PUT_ACTIVITY_AT_SUPPORT') return '<span class="type-tag tag-put-sup">PUT@SUP</span>';
  if (t.includes('UNUSUAL')) return '<span class="type-tag tag-unusual">UNUSUAL</span>';
  if (t === 'REPEAT_FLOW') return '<span class="type-tag tag-other">REPEAT</span>';
  if (t === 'OTM_CALL_BUY_THIN_NAME') return '<span class="type-tag tag-sweep">OTM THIN</span>';
  return '<span class="type-tag tag-other">' + t.replace(/_/g,' ').substring(0,10) + '</span>';
}

function sidePill(ct) {
  if (ct === 'call') return '<span class="side-pill side-call">C</span>';
  if (ct === 'put') return '<span class="side-pill side-put">P</span>';
  return '<span class="side-pill" style="color:#474d57">—</span>';
}

function baPill(dir) {
  if (!dir || dir === 'UNKNOWN') return '<span class="ba-pill ba-none">—</span>';
  if (dir === 'BUYER_AGGRESSIVE' || dir === 'BUYER_SWEEP') return '<span class="ba-pill ba-ask">ASK</span>';
  if (dir === 'SELLER_AGGRESSIVE' || dir === 'SELLER_SWEEP') return '<span class="ba-pill ba-bid">BID</span>';
  if (dir === 'LIKELY_BUYER') return '<span class="ba-pill ba-ask" style="opacity:0.7">ASK</span>';
  if (dir === 'LIKELY_SELLER') return '<span class="ba-pill ba-bid" style="opacity:0.7">BID</span>';
  if (dir === 'MIXED') return '<span class="ba-pill ba-mid">MID</span>';
  return '<span class="ba-pill ba-none">—</span>';
}

function voiClass(r) {
  if (r == null) return 'voi-normal';
  if (r >= 5) return 'voi-hot';
  if (r >= 2) return 'voi-warm';
  return 'voi-normal';
}

function scoreRowClass(s) {
  if (s >= 8) return 'sc-high';
  if (s >= 5) return 'sc-mid';
  return 'sc-low';
}

/* ── Render ── */
function renderRow(row, isNew) {
  const otm = calcOTM(row);
  const dte = calcDTE(row.expiry);
  const strike = row.strike
    ? `${row.strike}${row.contract_type === 'call' ? 'C' : row.contract_type === 'put' ? 'P' : ''}`
    : '—';
  const expiryShort = row.expiry ? row.expiry.substring(5) : '';

  return `<div class="flow-row grid-cols ${scoreRowClass(row.score)}${isNew ? ' new-row' : ''}" data-id="${row.id}">
    <div class="c c-time">${timeStr(row.created_at)}</div>
    <div class="c c-ticker">${row.ticker}${typeTag(row)}</div>
    <div class="c c-side">${sidePill(row.contract_type)}</div>
    <div class="c c-bidask">${baPill(row.direction)}</div>
    <div class="c c-contract">${strike}<span class="exp">${expiryShort}</span></div>
    <div class="c c-num muted">${dte}</div>
    <div class="c c-num">${row.stock_price ? '$' + Number(row.stock_price).toFixed(2) : '—'}</div>
    <div class="c c-num">${row.premium != null ? '$' + Number(row.premium).toFixed(2) : '—'}</div>
    <div class="c c-num ${otm.cls}">${otm.label}</div>
    <div class="c c-num">${fmtNum(row.volume)}</div>
    <div class="c c-num">${fmtCurrency(row.notional)}</div>
    <div class="c c-num dim">—</div>
    <div class="c c-num dim">—</div>
    <div class="c c-num muted">${fmtNum(row.volume)}</div>
    <div class="c c-num muted">${fmtNum(row.open_interest)}</div>
    <div class="c c-num ${voiClass(row.vol_oi_ratio)}">${row.vol_oi_ratio != null ? Number(row.vol_oi_ratio).toFixed(1) + 'x' : '—'}</div>
    <div class="c c-num dim">—</div>
  </div>`;
}

/* ── Filters ── */
function getFilters() {
  return {
    minScore: parseInt(document.getElementById('filterScore').value),
    type: document.getElementById('filterType').value,
    side: document.getElementById('filterSide').value,
    ticker: document.getElementById('filterTicker').value.toUpperCase().trim(),
    date: document.getElementById('filterDate').value,
  };
}

function applyFilters(alerts) {
  const f = getFilters();
  return alerts.filter(a => {
    if (a.score < f.minScore) return false;
    if (f.type !== 'all') {
      if (f.type === 'UNUSUAL') { if (!a.signal_type.includes('UNUSUAL')) return false; }
      else if (a.signal_type !== f.type) return false;
    }
    if (f.side !== 'all' && a.contract_type !== f.side) return false;
    if (f.ticker && a.ticker !== f.ticker) return false;
    if (f.date && a.scan_date !== f.date) return false;
    return true;
  });
}

function renderAll() {
  const filtered = applyFilters(allAlerts);
  if (filtered.length === 0) {
    tableBody.innerHTML = '<div class="empty-state"><h2>No alerts match filters</h2><p>Adjust filters above.</p></div>';
  } else {
    tableBody.innerHTML = filtered.map(a => renderRow(a, false)).join('');
  }
  updateStats(filtered);
}

function updateStats(filtered) {
  document.getElementById('statCount').textContent = filtered.length;
  document.getElementById('statTickers').textContent = new Set(filtered.map(a => a.ticker)).size;
  document.getElementById('statSweeps').textContent = filtered.filter(a => a.is_sweep).length;
  const top = filtered.length ? Math.max(...filtered.map(a => a.score)) : 0;
  document.getElementById('statTopScore').textContent = top || '—';
}

function updateDateFilter() {
  const dates = [...new Set(allAlerts.map(a => a.scan_date))].sort().reverse();
  const sel = document.getElementById('filterDate');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All</option>' + dates.map(d =>
    `<option value="${d}"${d === cur ? ' selected' : ''}>${d}</option>`
  ).join('');
}

/* ── Data loading ── */
async function loadAlerts() {
  try {
    const res = await fetch(REST_URL + '?select=*&order=created_at.desc&limit=500', { headers: HEADERS });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allAlerts = await res.json();
    updateDateFilter();
    renderAll();
    lastUpdate.textContent = allAlerts.length + ' alerts loaded';
  } catch (e) {
    lastUpdate.textContent = 'Error: ' + e.message;
  }
}

function startRealtime() {
  if (sb) {
    sb.channel('flow-rt')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'alerts' }, p => handleNewAlert(p.new))
      .subscribe();
  } else {
    setInterval(pollForNew, 10000);
  }
}

async function pollForNew() {
  try {
    const maxId = allAlerts.length ? Math.max(...allAlerts.map(a => a.id)) : 0;
    const res = await fetch(REST_URL + '?select=*&id=gt.' + maxId + '&order=created_at.desc', { headers: HEADERS });
    if (!res.ok) return;
    const rows = await res.json();
    for (const r of rows.reverse()) handleNewAlert(r);
  } catch(e) {}
}

function handleNewAlert(row) {
  if (allAlerts.some(a => a.id === row.id)) return;
  allAlerts.unshift(row);
  updateDateFilter();
  const filtered = applyFilters([row]);
  if (filtered.length > 0) {
    const empty = tableBody.querySelector('.empty-state');
    if (empty) empty.remove();
    tableBody.insertAdjacentHTML('afterbegin', renderRow(row, true));
    updateStats(applyFilters(allAlerts));
    setTimeout(() => {
      const el = tableBody.querySelector('[data-id="' + row.id + '"]');
      if (el) el.classList.remove('new-row');
    }, 4000);
  }
  lastUpdate.textContent = row.ticker + ' ' + (row.contract_type||'').toUpperCase() + ' ' + (row.strike||'') + ' (' + row.score + ')';
}

/* ── Init ── */
document.getElementById('filterScore').addEventListener('change', renderAll);
document.getElementById('filterType').addEventListener('change', renderAll);
document.getElementById('filterSide').addEventListener('change', renderAll);
document.getElementById('filterTicker').addEventListener('input', renderAll);
document.getElementById('filterDate').addEventListener('change', renderAll);

loadAlerts().then(() => startRealtime());
</script>
</body>
</html>
