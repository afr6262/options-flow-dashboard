<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Flow Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0e11;
    color: #eaecef;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: #0b0e11;
    border-bottom: 1px solid #1e2329;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(14, 203, 129, 0.1);
    border: 1px solid rgba(14, 203, 129, 0.3);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #0ecb81;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .live-badge .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #0ecb81;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header .status {
    font-size: 12px;
    color: #848e9c;
  }

  /* ── Toolbar ── */
  .toolbar {
    background: #0b0e11;
    border-bottom: 1px solid #1e2329;
    padding: 10px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .toolbar-filters {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .filter-group label {
    color: #848e9c;
    font-size: 12px;
    font-weight: 500;
  }

  .filter-group select, .filter-group input {
    background: #1e2329;
    border: 1px solid #2b3139;
    color: #eaecef;
    padding: 5px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }

  .filter-group select:hover, .filter-group input:hover {
    border-color: #474d57;
  }

  .filter-group select:focus, .filter-group input:focus {
    outline: none;
    border-color: #f0b90b;
  }

  .toolbar-stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: #848e9c;
    white-space: nowrap;
  }

  .toolbar-stats .val {
    color: #eaecef;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Table ── */
  .flow-table {
    width: 100%;
    min-width: 900px;
  }

  .table-header {
    display: grid;
    grid-template-columns: 48px 72px 70px 1fr 80px 90px 100px 100px 80px 70px;
    gap: 0;
    padding: 8px 24px;
    background: #1e2329;
    border-bottom: 1px solid #2b3139;
    position: sticky;
    top: 49px;
    z-index: 50;
  }

  .table-header .th {
    font-size: 11px;
    font-weight: 600;
    color: #848e9c;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0 6px;
  }

  .table-header .th.right { text-align: right; }

  .table-body {
    overflow-x: auto;
  }

  /* ── Rows ── */
  .flow-row {
    display: grid;
    grid-template-columns: 48px 72px 70px 1fr 80px 90px 100px 100px 80px 70px;
    gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid #181a1f;
    align-items: center;
    min-height: 38px;
    transition: background 0.15s;
    animation: fadeIn 0.25s ease-out;
  }

  .flow-row:nth-child(even) { background: rgba(30, 35, 41, 0.3); }
  .flow-row:hover { background: #1e2329; }

  .flow-row.new-row {
    background: rgba(240, 185, 11, 0.06);
    border-bottom-color: rgba(240, 185, 11, 0.2);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .flow-row .cell {
    padding: 7px 6px;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Score */
  .cell-score {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
  }

  .cell-score.s-high { color: #f6465d; }
  .cell-score.s-mid { color: #f0b90b; }
  .cell-score.s-low { color: #848e9c; }

  /* Ticker */
  .cell-ticker {
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }

  /* Type/Side */
  .cell-type {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .side-call { color: #0ecb81; }
  .side-put { color: #f6465d; }
  .side-sweep { color: #b266ff; }
  .side-unusual { color: #f0b90b; }

  /* Contract detail */
  .cell-contract {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }

  .contract-strike {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #eaecef;
  }

  .contract-expiry {
    font-size: 11px;
    color: #848e9c;
  }

  .sweep-tag {
    display: inline-block;
    background: rgba(178, 102, 255, 0.15);
    color: #b266ff;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Direction — solid color blocks like UW */
  .cell-dir {
    text-align: center;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 4px 0 !important;
  }

  .cell-dir .dir-pill {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 3px;
    min-width: 48px;
  }

  .dir-buy .dir-pill { background: #0ecb81; color: #000; }
  .dir-sell .dir-pill { background: #f6465d; color: #fff; }
  .dir-neutral .dir-pill { background: #2b3139; color: #474d57; }

  /* Numeric cells */
  .cell-num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #eaecef;
  }

  .cell-num.dim { color: #848e9c; }

  /* Vol/OI highlighting */
  .voloi-hot { color: #f6465d; font-weight: 600; }
  .voloi-warm { color: #f0b90b; }
  .voloi-normal { color: #848e9c; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 120px 20px;
    color: #474d57;
  }

  .empty-state h2 {
    font-size: 18px;
    margin-bottom: 8px;
    color: #848e9c;
    font-weight: 600;
  }

  .empty-state p { font-size: 14px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0b0e11; }
  ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #474d57; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>OPTIONS FLOW</h1>
    <div class="live-badge" id="liveBadge">
      <div class="pulse"></div>
      <span>LIVE</span>
    </div>
  </div>
  <div class="status" id="lastUpdate">Connecting...</div>
</div>

<div class="toolbar">
  <div class="toolbar-filters">
    <div class="filter-group">
      <label>Score</label>
      <select id="filterScore">
        <option value="0">All</option>
        <option value="4" selected>4+</option>
        <option value="6">6+</option>
        <option value="8">8+</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Type</label>
      <select id="filterType">
        <option value="all">All</option>
        <option value="SWEEP">Sweeps</option>
        <option value="LARGE_TRADE">Blocks</option>
        <option value="LARGE_PUT_ACTIVITY_AT_SUPPORT">Put @ Support</option>
        <option value="UNUSUAL">Unusual Vol</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Side</label>
      <select id="filterSide">
        <option value="all">All</option>
        <option value="call">Calls</option>
        <option value="put">Puts</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Ticker</label>
      <input id="filterTicker" type="text" placeholder="AAPL" size="6">
    </div>
    <div class="filter-group">
      <label>Date</label>
      <select id="filterDate"></select>
    </div>
  </div>
  <div class="toolbar-stats">
    <div>Alerts <span class="val" id="statCount">0</span></div>
    <div>Tickers <span class="val" id="statTickers">0</span></div>
    <div>Sweeps <span class="val" id="statSweeps">0</span></div>
    <div>Top <span class="val" id="statTopScore">—</span></div>
  </div>
</div>

<div class="flow-table">
  <div class="table-header">
    <div class="th">Score</div>
    <div class="th">Ticker</div>
    <div class="th">Type</div>
    <div class="th">Contract</div>
    <div class="th right">Side</div>
    <div class="th right">Size</div>
    <div class="th right">Premium</div>
    <div class="th right">Notional</div>
    <div class="th right">Vol/OI</div>
    <div class="th right">OI</div>
  </div>

  <div class="table-body" id="tableBody">
    <div class="empty-state">
      <h2>Waiting for flow...</h2>
      <p>Alerts appear here in real-time when the scanner runs.</p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ylovbipfqhaktgqzifsx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsb3ZiaXBmcWhha3RncXppZnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjQ0NjMsImV4cCI6MjA4Njg0MDQ2M30.-pL09_2YqgfqV-oHOn3eqVL7GIQKy9qOzbB5VV74gbE';

const HEADERS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };
const REST_URL = SUPABASE_URL + '/rest/v1/alerts';

let sb = null;
try { sb = window.supabase && window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

let allAlerts = [];
const tableBody = document.getElementById('tableBody');
const lastUpdate = document.getElementById('lastUpdate');

function fmtCurrency(n) {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + Number(n).toFixed(0);
}

function fmtNum(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}

function typeLabel(row) {
  if (row.signal_type === 'SWEEP') return 'SWEEP';
  if (row.signal_type === 'LARGE_TRADE') return 'BLOCK';
  if (row.signal_type === 'LARGE_PUT_ACTIVITY_AT_SUPPORT') return 'PUT@SUP';
  if (row.signal_type === 'UNUSUAL_CALL_VOLUME') return 'UNS CALL';
  if (row.signal_type === 'UNUSUAL_PUT_VOLUME') return 'UNS PUT';
  if (row.signal_type === 'RISK_REVERSAL') return 'REVSAL';
  if (row.signal_type === 'REPEAT_FLOW') return 'REPEAT';
  if (row.signal_type === 'OTM_CALL_BUY_THIN_NAME') return 'OTM THIN';
  return row.signal_type;
}

function typeColorClass(row) {
  if (row.signal_type === 'SWEEP') return 'side-sweep';
  if (row.contract_type === 'call') return 'side-call';
  if (row.contract_type === 'put') return 'side-put';
  if (row.signal_type.includes('UNUSUAL')) return 'side-unusual';
  return '';
}

function dirClass(dir) {
  if (!dir) return 'dir-neutral';
  if (dir.includes('BUYER')) return 'dir-buy';
  if (dir.includes('SELLER')) return 'dir-sell';
  return 'dir-neutral';
}

function dirLabel(dir) {
  if (!dir || dir === 'UNKNOWN') return '—';
  if (dir === 'BUYER_AGGRESSIVE' || dir === 'BUYER_SWEEP') return 'ASK';
  if (dir === 'SELLER_AGGRESSIVE' || dir === 'SELLER_SWEEP') return 'BID';
  if (dir === 'LIKELY_BUYER') return 'A-ASK';
  if (dir === 'LIKELY_SELLER') return 'A-BID';
  if (dir === 'MIXED') return 'MID';
  return '—';
}

function scoreClass(score) {
  if (score >= 8) return 's-high';
  if (score >= 5) return 's-mid';
  return 's-low';
}

function voloiClass(ratio) {
  if (ratio == null) return 'voloi-normal';
  if (ratio >= 5) return 'voloi-hot';
  if (ratio >= 2) return 'voloi-warm';
  return 'voloi-normal';
}

function renderRow(row, isNew) {
  const isCall = row.contract_type === 'call';
  const isPut = row.contract_type === 'put';
  const rowClass = isCall ? 'is-call' : isPut ? 'is-put' : '';
  const newClass = isNew ? ' new-row' : '';

  const strike = row.strike
    ? `${row.strike}${isCall ? 'C' : isPut ? 'P' : ''}`
    : '';
  const expiry = row.expiry || '';
  const sweepTag = row.is_sweep
    ? `<span class="sweep-tag">${row.sweep_fills || ''}f ${row.sweep_exchanges || ''}ex</span>`
    : '';
  const stock = row.stock_price ? '@ $' + Number(row.stock_price).toFixed(2) : '';

  return `<div class="flow-row ${rowClass}${newClass}" data-id="${row.id}">
    <div class="cell cell-score ${scoreClass(row.score)}">${row.score}</div>
    <div class="cell cell-ticker">${row.ticker}</div>
    <div class="cell cell-type ${typeColorClass(row)}">${typeLabel(row)}${sweepTag}</div>
    <div class="cell cell-contract">
      <span class="contract-strike">${strike} ${stock}</span>
      <span class="contract-expiry">${expiry}</span>
    </div>
    <div class="cell cell-dir ${dirClass(row.direction)}"><span class="dir-pill">${dirLabel(row.direction)}</span></div>
    <div class="cell cell-num">${fmtNum(row.volume)}</div>
    <div class="cell cell-num">${row.premium != null ? '$' + Number(row.premium).toFixed(2) : '—'}</div>
    <div class="cell cell-num">${fmtCurrency(row.notional)}</div>
    <div class="cell cell-num ${voloiClass(row.vol_oi_ratio)}">${row.vol_oi_ratio != null ? Number(row.vol_oi_ratio).toFixed(1) + 'x' : '—'}</div>
    <div class="cell cell-num dim">${fmtNum(row.open_interest)}</div>
  </div>`;
}

function getFilters() {
  return {
    minScore: parseInt(document.getElementById('filterScore').value),
    type: document.getElementById('filterType').value,
    side: document.getElementById('filterSide').value,
    ticker: document.getElementById('filterTicker').value.toUpperCase().trim(),
    date: document.getElementById('filterDate').value,
  };
}

function applyFilters(alerts) {
  const f = getFilters();
  return alerts.filter(a => {
    if (a.score < f.minScore) return false;
    if (f.type !== 'all') {
      if (f.type === 'UNUSUAL') {
        if (!a.signal_type.includes('UNUSUAL')) return false;
      } else if (a.signal_type !== f.type) return false;
    }
    if (f.side !== 'all' && a.contract_type !== f.side) return false;
    if (f.ticker && a.ticker !== f.ticker) return false;
    if (f.date && a.scan_date !== f.date) return false;
    return true;
  });
}

function renderAll() {
  const filtered = applyFilters(allAlerts);
  if (filtered.length === 0) {
    tableBody.innerHTML = `<div class="empty-state"><h2>No alerts match filters</h2><p>Try adjusting your filters above.</p></div>`;
  } else {
    tableBody.innerHTML = filtered.map(a => renderRow(a, false)).join('');
  }
  updateStats(filtered);
}

function updateStats(filtered) {
  document.getElementById('statCount').textContent = filtered.length;
  document.getElementById('statTickers').textContent = new Set(filtered.map(a => a.ticker)).size;
  document.getElementById('statSweeps').textContent = filtered.filter(a => a.is_sweep).length;
  const top = filtered.length ? Math.max(...filtered.map(a => a.score)) : 0;
  document.getElementById('statTopScore').textContent = top || '—';
}

function updateDateFilter() {
  const dates = [...new Set(allAlerts.map(a => a.scan_date))].sort().reverse();
  const sel = document.getElementById('filterDate');
  const current = sel.value;
  sel.innerHTML = '<option value="">All dates</option>' + dates.map(d =>
    `<option value="${d}"${d === current ? ' selected' : ''}>${d}</option>`
  ).join('');
}

// Load alerts via REST
async function loadAlerts() {
  try {
    const res = await fetch(REST_URL + '?select=*&order=created_at.desc&limit=500', { headers: HEADERS });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allAlerts = await res.json();
    updateDateFilter();
    renderAll();
    lastUpdate.textContent = allAlerts.length + ' alerts';
    document.getElementById('liveBadge').style.borderColor = 'rgba(14, 203, 129, 0.5)';
  } catch (e) {
    console.error('Load error:', e);
    lastUpdate.textContent = 'Error: ' + e.message;
  }
}

// Real-time
function startRealtime() {
  if (sb) {
    sb.channel('alerts-realtime')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'alerts' }, (payload) => {
        handleNewAlert(payload.new);
      })
      .subscribe();
  } else {
    setInterval(pollForNew, 10000);
  }
}

async function pollForNew() {
  try {
    const maxId = allAlerts.length ? Math.max(...allAlerts.map(a => a.id)) : 0;
    const res = await fetch(REST_URL + '?select=*&id=gt.' + maxId + '&order=created_at.desc', { headers: HEADERS });
    if (!res.ok) return;
    const newRows = await res.json();
    for (const row of newRows.reverse()) handleNewAlert(row);
  } catch(e) {}
}

function handleNewAlert(row) {
  if (allAlerts.some(a => a.id === row.id)) return;
  allAlerts.unshift(row);
  updateDateFilter();

  const filtered = applyFilters([row]);
  if (filtered.length > 0) {
    const empty = tableBody.querySelector('.empty-state');
    if (empty) empty.remove();
    tableBody.insertAdjacentHTML('afterbegin', renderRow(row, true));
    updateStats(applyFilters(allAlerts));
    setTimeout(() => {
      const el = tableBody.querySelector('[data-id="' + row.id + '"]');
      if (el) el.classList.remove('new-row');
    }, 4000);
  }

  lastUpdate.textContent = row.ticker + ' ' + typeLabel(row) + ' (' + row.score + ')';
}

// Filter listeners
document.getElementById('filterScore').addEventListener('change', renderAll);
document.getElementById('filterType').addEventListener('change', renderAll);
document.getElementById('filterSide').addEventListener('change', renderAll);
document.getElementById('filterTicker').addEventListener('input', renderAll);
document.getElementById('filterDate').addEventListener('change', renderAll);

// Init
loadAlerts().then(() => startRealtime());
</script>
</body>
</html>
